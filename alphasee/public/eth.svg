<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="coinETH" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="35%" stop-color="#D4A830"/>
      <stop offset="70%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6400"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="#8B6400"/>
  <circle cx="100" cy="100" r="97" fill="url(#coinETH)"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#C8920A" stroke-width="1.5" opacity="0.5"/>
  <!-- ETH diamond -->
  <!-- top triangle -->
  <polygon points="100,38 130,96 100,110 70,96" fill="#6B4C00" opacity="0.85"/>
  <!-- bottom triangle -->
  <polygon points="100,118 130,103 100,162 70,103" fill="#6B4C00" opacity="0.65"/>
  <!-- inner facets for 3D look -->
  <polygon points="100,38 130,96 100,110" fill="#5A3C00" opacity="0.4"/>
  <polygon points="100,38 70,96 100,110" fill="#8B6810" opacity="0.5"/>
  <polygon points="100,118 130,103 100,162" fill="#5A3C00" opacity="0.35"/>
  <polygon points="100,118 70,103 100,162" fill="#8B6810" opacity="0.45"/>
  <!-- highlight on coin -->
  <ellipse cx="80" cy="68" rx="16" ry="9" fill="#FFEEAA" opacity="0.22" transform="rotate(-25 80 68)"/>
  <!-- text -->
  <text x="100" y="186" font-family="Georgia, serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B4C00" opacity="0.8" letter-spacing="2">ethereum</text>
</svg>
